name: Build and Push Docker image and Redeploy 

on:
  push:
    branches:
      - main
      - dev

env:
  K8S_DEPLOYMENT_NAME: frontend
  
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    outputs:
      version: ${{ steps.increment-version.outputs.new-version }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: blob:none
      
      - name: Increment version
        id: increment-version
        uses: RichardInnocent/semantic-versioning-git@v0.0.1
        with:
          version-prefix: ""

  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest , ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
  redeploy:
    needs: build
    runs-on: iip-org-runner
    steps:
      - name: Determine K8s Namespace
        run: |
          case "$GITHUB_REF_NAME" in
            main)
              echo "K8S_NAMESPACE=iip-prod" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "K8S_NAMESPACE=iip-dev" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch: $GITHUB_REF_NAME"
              exit 0
              ;;
          esac

      - name: Install kubectl
        uses: azure/setup-kubectl@v5.1.0
        with:
          version: v1.36.1

      - name: Redeploy on Kubernetes
        run: kubectl rollout restart deployment/${{ env.K8S_DEPLOYMENT_NAME }} -n $K8S_NAMESPACE

      - name: Wait for redeployment to finish
        run: kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT_NAME }} -n $K8S_NAMESPACE --timeout=1m